<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>サブスクBox</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* iOSセーフエリア対応とアニメーション用 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
    .modal-content-enter { animation: slideUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50 font-sans sm:bg-gray-200 flex justify-center text-gray-800">

  <!-- スマホ用コンテナ -->
  <div class="w-full max-w-md bg-gray-50 min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
    
    <!-- ヘッダー -->
    <header class="bg-white pt-12 pb-4 px-6 rounded-b-3xl shadow-sm z-10 sticky top-0">
      <div class="flex items-center gap-2.5">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-1.5 rounded-xl shadow-sm">
          <i data-lucide="box" class="text-white w-5 h-5"></i>
        </div>
        <h1 class="text-2xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
          サブスクBox
        </h1>
      </div>
      <p class="text-xs text-gray-500 mt-2 ml-1">支出を見える化して賢く管理</p>
    </header>

    <!-- メインコンテンツ領域 -->
    <main id="main-content" class="flex-1 overflow-y-auto pb-24 relative">
      <!-- コンテンツはJSでレンダリングされます -->
    </main>

    <!-- 追加ボタン (FAB) -->
    <button onclick="openModal()" class="absolute bottom-24 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-600/40 flex items-center justify-center hover:bg-blue-700 hover:scale-105 active:scale-95 transition-all z-20">
      <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <!-- ボトムナビゲーション -->
    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-100 pb-safe z-10">
      <div class="flex justify-around items-center h-16">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center justify-center w-full h-full transition-colors text-blue-600">
          <i data-lucide="home" class="w-5 h-5 mb-1" id="icon-home"></i>
          <span class="text-[10px] font-medium">ホーム</span>
        </button>
        <button onclick="switchTab('calendar')" id="tab-calendar" class="flex flex-col items-center justify-center w-full h-full transition-colors text-gray-400 hover:text-gray-600">
          <i data-lucide="calendar" class="w-5 h-5 mb-1" id="icon-calendar"></i>
          <span class="text-[10px] font-medium">カレンダー</span>
        </button>
        <button onclick="switchTab('analysis')" id="tab-analysis" class="flex flex-col items-center justify-center w-full h-full transition-colors text-gray-400 hover:text-gray-600">
          <i data-lucide="pie-chart" class="w-5 h-5 mb-1" id="icon-analysis"></i>
          <span class="text-[10px] font-medium">診断</span>
        </button>
      </div>
    </nav>

    <!-- サブスク追加用モーダル (初期非表示) -->
    <div id="add-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="modal-content-enter w-full max-w-md bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center p-5 border-b border-gray-100 sticky top-0 bg-white z-10">
          <h2 class="text-lg font-bold text-gray-800">新しく登録する</h2>
          <button onclick="closeModal()" class="p-2 text-gray-400 hover:bg-gray-100 rounded-full">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <form id="add-form" onsubmit="handleAdd(event)" class="p-5 space-y-5">
          <!-- サービス名 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">サービス名</label>
            <input type="text" id="input-name" required placeholder="例: Netflix, ジム" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
          </div>

          <!-- 公式サイトURL -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 flex justify-between">
              <span>公式サイトのURL</span>
              <span class="text-gray-400 text-xs">任意</span>
            </label>
            <input type="text" id="input-url" placeholder="例: netflix.com" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all text-sm">
            <p class="text-xs text-gray-400 mt-1">入力するとアプリのアイコンが表示されます</p>
          </div>

          <!-- 月額料金 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">月額料金 (円)</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">¥</span>
              <input type="number" id="input-price" required min="0" placeholder="1000" class="w-full p-3 pl-8 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>
          </div>

          <!-- 毎月の支払い日 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">毎月の支払い日</label>
            <div class="flex items-center gap-2">
              <input type="number" id="input-billing-day" required min="1" max="31" value="1" class="w-24 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all text-center">
              <span class="text-gray-600 font-medium">日</span>
            </div>
          </div>

          <!-- 利用頻度 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1">
              <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-indigo-500"></i>
              最近、どのくらい使ってますか？
            </label>
            <input type="hidden" id="input-frequency" value="high">
            <div class="grid grid-cols-3 gap-2" id="freq-buttons">
              <button type="button" onclick="setFrequency('high')" id="btn-freq-high" class="p-2 rounded-xl text-sm font-medium border transition-all bg-blue-50 border-blue-500 text-blue-700">よく使う</button>
              <button type="button" onclick="setFrequency('medium')" id="btn-freq-medium" class="p-2 rounded-xl text-sm font-medium border transition-all bg-white border-gray-200 text-gray-600 hover:bg-gray-50">たまに</button>
              <button type="button" onclick="setFrequency('low')" id="btn-freq-low" class="p-2 rounded-xl text-sm font-medium border transition-all bg-white border-gray-200 text-gray-600 hover:bg-gray-50">ほぼ使ってない</button>
            </div>
          </div>

          <!-- 送信ボタン -->
          <div class="pt-4">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
              登録する
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // --- 状態管理 ---
    let subscriptions = [
      { id: 1, name: 'Netflix', price: 1490, cycle: 'monthly', billingDay: 10, frequency: 'high', domain: 'netflix.com' },
      { id: 2, name: 'Amazon Prime', price: 600, cycle: 'monthly', billingDay: 15, frequency: 'high', domain: 'amazon.co.jp' },
      { id: 3, name: 'Claude Pro', price: 3000, cycle: 'monthly', billingDay: 5, frequency: 'high', domain: 'claude.ai' },
      { id: 4, name: '使っていないフィットネス', price: 1080, cycle: 'monthly', billingDay: 20, frequency: 'low', domain: '' },
      { id: 5, name: '謎の動画サービス', price: 550, cycle: 'monthly', billingDay: 28, frequency: 'low', domain: '' }
    ];
    let activeTab = 'home';
    
    // カレンダー用の状態
    const today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth(); // 0: 1月, 11: 12月

    // 初期化
    document.addEventListener("DOMContentLoaded", () => {
      render();
    });

    // --- 計算ロジック ---
    function getTotals() {
      let monthly = 0;
      let yearly = 0;
      subscriptions.forEach(sub => {
        if (sub.cycle === 'monthly') {
          monthly += sub.price;
          yearly += sub.price * 12;
        } else {
          yearly += sub.price;
          monthly += Math.round(sub.price / 12);
        }
      });
      return { monthlyTotal: monthly, yearlyTotal: yearly };
    }

    function getPotentialSavings() {
      return subscriptions
        .filter(sub => sub.frequency === 'low')
        .reduce((acc, sub) => acc + (sub.cycle === 'monthly' ? sub.price : Math.round(sub.price / 12)), 0);
    }

    // --- レンダリング処理 ---
    function render() {
      const main = document.getElementById('main-content');
      
      if (activeTab === 'home') main.innerHTML = getHomeHTML();
      else if (activeTab === 'calendar') main.innerHTML = getCalendarHTML();
      else if (activeTab === 'analysis') main.innerHTML = getAnalysisHTML();

      // ナビゲーションの見た目を更新
      updateTabStyles();
      // アイコンを再生成
      lucide.createIcons();
    }

    // アイコン生成ヘルパー
    function getServiceIconHTML(name, domain, sizeClass = 'w-10 h-10', customClass = '') {
      const fallbackHTML = `<div class="${sizeClass} ${customClass} bg-gradient-to-br from-gray-100 to-gray-200 border border-gray-200 flex items-center justify-center text-gray-500 font-bold shadow-sm shrink-0 text-xs">${name.charAt(0)}</div>`;
      if (!domain) return fallbackHTML;
      
      // onerror時に代替HTML(fallback)に切り替える処理
      const errorAction = `this.onerror=null; this.outerHTML='${fallbackHTML}';`;
      return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" alt="${name}" class="${sizeClass} ${customClass} bg-white shadow-sm border border-gray-100 object-cover shrink-0" onerror="${errorAction}">`;
    }

    // 1. ホームタブHTML生成
    function getHomeHTML() {
      const { monthlyTotal, yearlyTotal } = getTotals();
      
      let listHTML = '';
      if (subscriptions.length === 0) {
        listHTML = `<div class="text-center py-10 text-gray-400 bg-gray-50 rounded-xl border border-dashed border-gray-200">登録されているサービスがありません</div>`;
      } else {
        listHTML = subscriptions.map(sub => `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center group relative overflow-hidden">
            <div class="flex items-center gap-3">
              ${getServiceIconHTML(sub.name, sub.domain, 'w-10 h-10', 'rounded-xl')}
              <div class="flex flex-col">
                <span class="font-bold text-gray-800">${sub.name}</span>
                <span class="text-xs text-gray-500 mt-1 flex items-center gap-1">毎月 ${sub.billingDay}日 支払い</span>
              </div>
            </div>
            <div class="flex items-center gap-4">
              <div class="text-right">
                <span class="font-bold text-gray-800">¥${sub.price.toLocaleString()}</span>
                <span class="text-xs text-gray-500 block">${sub.cycle === 'monthly' ? '/月' : '/年'}</span>
              </div>
              <button onclick="deleteSubscription(${sub.id})" class="p-2 text-red-400 hover:bg-red-50 rounded-full transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        `).join('');
      }

      return `
        <div class="p-4 space-y-6 fade-in-up">
          <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-lg">
            <h2 class="text-blue-100 text-sm font-medium mb-1">今月の支払い予定合計</h2>
            <div class="flex items-baseline gap-1">
              <span class="text-4xl font-bold">¥${monthlyTotal.toLocaleString()}</span>
              <span class="text-blue-200 text-sm">/月</span>
            </div>
            <div class="mt-4 pt-4 border-t border-blue-500/30 flex justify-between items-center text-sm">
              <span class="text-blue-100">年額換算</span>
              <span class="font-semibold">¥${yearlyTotal.toLocaleString()}</span>
            </div>
          </div>
          <div>
            <h3 class="text-gray-700 font-bold mb-3 flex items-center gap-2">
              <i data-lucide="credit-card" class="w-4 h-4"></i>
              登録中のサービス (${subscriptions.length})
            </h3>
            <div class="space-y-3">${listHTML}</div>
          </div>
        </div>
      `;
    }

    // 2. カレンダータブHTML生成
    function getCalendarHTML() {
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const firstDayOfWeek = new Date(currentYear, currentMonth, 1).getDay(); // 0: Sun, 1: Mon...

      let html = `
        <div class="p-4 space-y-4 fade-in-up pb-8">
          <!-- カレンダーヘッダー -->
          <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">
            <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <i data-lucide="chevron-left" class="w-5 h-5 text-gray-600"></i>
            </button>
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
              <i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i>
              ${currentYear}年 ${currentMonth + 1}月
            </h2>
            <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <i data-lucide="chevron-right" class="w-5 h-5 text-gray-600"></i>
            </button>
          </div>

          <!-- カレンダーグリッド -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- 曜日 -->
            <div class="grid grid-cols-7 border-b border-gray-100 bg-gray-50">
              ${['日', '月', '火', '水', '木', '金', '土'].map((d, i) => 
                `<div class="text-center py-2 text-xs font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-500'}">${d}</div>`
              ).join('')}
            </div>
            <!-- 日付セル -->
            <div class="grid grid-cols-7 auto-rows-[minmax(64px,_auto)]">
      `;

      // 空白セル（月のはじめ）
      for (let i = 0; i < firstDayOfWeek; i++) {
        html += `<div class="border-b border-r border-gray-100 bg-gray-50/50"></div>`;
      }

      // 日付セル
      for (let day = 1; day <= daysInMonth; day++) {
        // その日に支払うサブスクを取得
        const subsToday = subscriptions.filter(s => s.billingDay === day);
        
        let subsHtml = '';
        if (subsToday.length > 0) {
          subsHtml = `<div class="mt-1 flex flex-wrap gap-0.5 justify-center">` + 
            subsToday.map(sub => getServiceIconHTML(sub.name, sub.domain, 'w-5 h-5', 'rounded-md')).join('') +
          `</div>`;
        }

        const isToday = (day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());
        const dayClass = isToday 
          ? 'bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center mx-auto' 
          : 'text-gray-700';

        html += `
          <div class="border-b border-r border-gray-100 p-1 flex flex-col items-center">
            <div class="text-[10px] sm:text-xs font-bold mt-1 ${dayClass}">${day}</div>
            ${subsHtml}
          </div>
        `;
      }

      // 空白セル（月の終わり）
      const totalCells = firstDayOfWeek + daysInMonth;
      const remainingCells = (7 - (totalCells % 7)) % 7;
      for (let i = 0; i < remainingCells; i++) {
        html += `<div class="border-b ${i === remainingCells - 1 ? '' : 'border-r'} border-gray-100 bg-gray-50/50"></div>`;
      }

      html += `
            </div>
          </div>
          
          <!-- 詳細リスト -->
          <div class="pt-4 space-y-3">
            <h3 class="text-gray-700 font-bold mb-3 flex items-center gap-2">
              <i data-lucide="list" class="w-4 h-4"></i>
              今月の支払い詳細
            </h3>
      `;

      // 日付順のリスト表示
      const sortedSubs = [...subscriptions].sort((a, b) => a.billingDay - b.billingDay);
      if (sortedSubs.length === 0) {
        html += `<div class="text-center py-6 text-gray-400 bg-gray-50 rounded-xl border border-dashed border-gray-200">予定はありません</div>`;
      } else {
        html += sortedSubs.map(sub => `
          <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
              <div class="w-10 text-center shrink-0">
                <span class="text-[10px] text-gray-500 block">毎月</span>
                <span class="font-bold text-blue-600">${sub.billingDay}日</span>
              </div>
              ${getServiceIconHTML(sub.name, sub.domain, 'w-8 h-8', 'rounded-lg')}
              <span class="font-bold text-gray-800 text-sm">${sub.name}</span>
            </div>
            <span class="font-bold text-gray-800 shrink-0">¥${sub.price.toLocaleString()}</span>
          </div>
        `).join('');
      }

      html += `
          </div>
        </div>
      `;

      return html;
    }

    // 3. 診断タブHTML生成
    function getAnalysisHTML() {
      const savings = getPotentialSavings();
      let savingsHTML = '';
      if (savings > 0) {
        savingsHTML = `
          <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6 shadow-sm">
            <div class="flex items-start gap-3">
              <div class="bg-amber-100 p-2 rounded-full text-amber-600 mt-1"><i data-lucide="trending-down" class="w-5 h-5"></i></div>
              <div>
                <h3 class="text-amber-800 font-bold mb-1">節約できるかも！</h3>
                <p class="text-amber-700 text-sm mb-2">あまり使っていないサービスを解約すると、</p>
                <div class="text-2xl font-black text-amber-600">月々 ¥${savings.toLocaleString()}</div>
                <p class="text-amber-700 text-sm mt-1">の節約になります。</p>
              </div>
            </div>
          </div>`;
      } else {
        savingsHTML = `
          <div class="bg-green-50 border border-green-200 rounded-2xl p-5 mb-6 flex items-center gap-3">
            <i data-lucide="check-circle-2" class="w-6 h-6 text-green-500"></i>
            <span class="text-green-800 font-medium">すべてのサービスを活用できています！</span>
          </div>`;
      }

      const lowSubs = subscriptions.filter(s => s.frequency === 'low');
      const highSubs = subscriptions.filter(s => s.frequency === 'high');

      let lowHTML = lowSubs.length === 0 ? '' : `
        <div class="space-y-2">
          <h4 class="text-xs font-bold text-red-500 uppercase tracking-wider">見直し推奨 (あまり使っていない)</h4>
          ${lowSubs.map(sub => `
            <div class="bg-white p-3 rounded-lg border border-red-100 flex justify-between items-center opacity-80">
              <div class="flex items-center gap-2.5">
                ${getServiceIconHTML(sub.name, sub.domain, 'w-6 h-6', 'rounded-md')}
                <span class="font-medium text-gray-800">${sub.name}</span>
              </div>
              <span class="text-red-600 font-bold">¥${sub.price.toLocaleString()}</span>
            </div>
          `).join('')}
        </div>`;

      let highHTML = highSubs.length === 0 ? '' : `
        <div class="space-y-2 pt-4">
          <h4 class="text-xs font-bold text-green-600 uppercase tracking-wider">活用中 (よく使っている)</h4>
          ${highSubs.map(sub => `
            <div class="bg-white p-3 rounded-lg border border-gray-100 flex justify-between items-center">
              <div class="flex items-center gap-2.5">
                ${getServiceIconHTML(sub.name, sub.domain, 'w-6 h-6', 'rounded-md')}
                <span class="font-medium text-gray-700">${sub.name}</span>
              </div>
              <span class="text-gray-500">¥${sub.price.toLocaleString()}</span>
            </div>
          `).join('')}
        </div>`;

      return `
        <div class="p-4 space-y-6 fade-in-up">
          <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i data-lucide="pie-chart" class="w-5 h-5 text-indigo-600"></i>
            利用状況の診断
          </h2>
          ${savingsHTML}
          <div class="space-y-4">
            <h3 class="font-bold text-gray-700">利用頻度レビュー</h3>
            ${lowHTML}
            ${highHTML}
          </div>
        </div>
      `;
    }

    // --- 操作ロジック ---
    function switchTab(tab) {
      activeTab = tab;
      render();
    }
    
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      render();
    }

    function updateTabStyles() {
      const tabs = ['home', 'calendar', 'analysis'];
      tabs.forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (t === activeTab) {
          el.className = 'flex flex-col items-center justify-center w-full h-full transition-colors text-blue-600';
        } else {
          el.className = 'flex flex-col items-center justify-center w-full h-full transition-colors text-gray-400 hover:text-gray-600';
        }
      });
    }

    function deleteSubscription(id) {
      if(confirm('このサブスクを削除しますか？')){
        subscriptions = subscriptions.filter(sub => sub.id !== id);
        render();
      }
    }

    // --- モーダル・フォームロジック ---
    function openModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('add-modal').classList.add('modal-enter');
    }

    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden');
      document.getElementById('add-modal').classList.remove('modal-enter');
      document.getElementById('add-form').reset();
      setFrequency('high'); // フォーム初期化
    }

    function setFrequency(freq) {
      document.getElementById('input-frequency').value = freq;
      
      const styles = {
        high: { active: 'bg-blue-50 border-blue-500 text-blue-700', inactive: 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50' },
        medium: { active: 'bg-blue-50 border-blue-500 text-blue-700', inactive: 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50' },
        low: { active: 'bg-red-50 border-red-500 text-red-700', inactive: 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50' }
      };

      const freqs = ['high', 'medium', 'low'];
      freqs.forEach(f => {
        const btn = document.getElementById(`btn-freq-${f}`);
        btn.className = `p-2 rounded-xl text-sm font-medium border transition-all ${f === freq ? styles[f].active : styles[f].inactive}`;
      });
    }

    function handleAdd(e) {
      e.preventDefault();
      
      const name = document.getElementById('input-name').value;
      const url = document.getElementById('input-url').value;
      const price = parseInt(document.getElementById('input-price').value, 10);
      const billingDay = parseInt(document.getElementById('input-billing-day').value, 10);
      const frequency = document.getElementById('input-frequency').value;

      // ドメイン抽出
      let domain = '';
      if (url) {
        try {
          const urlObj = new URL(url.startsWith('http') ? url : `https://${url}`);
          domain = urlObj.hostname;
        } catch (err) {
          console.error("Invalid URL");
        }
      }

      subscriptions.push({
        id: Date.now(),
        name,
        price,
        cycle: 'monthly',
        billingDay,
        frequency,
        domain
      });

      closeModal();
      render();
    }
  </script>
</body>
</html>
